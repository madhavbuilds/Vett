# Publishes with PyPI "trusted publishing" (OIDC). No API token in GitHub secrets.
#
# If the publish step fails with invalid-publisher, add this publisher on PyPI for
# project "vett" (https://pypi.org/manage/project/vett/settings/publishing/):
#   Owner: madhavbuilds
#   Repository name: Vett          <-- must match GitHub (capital V)
#   Workflow name: publish-pypi.yml
#   Environment name: (leave empty)
#
# Docs: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
